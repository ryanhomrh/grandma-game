<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#f9e4c8" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Take Grandma to Wendy's</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #f9e4c8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 8px;
      font-family: Georgia, serif;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    h1 {
      color: #a0522d;
      font-size: clamp(1rem, 5vw, 1.4rem);
      margin-bottom: 8px;
      letter-spacing: 1px;
      text-align: center;
    }
    canvas {
      border: 3px solid #c4a882;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      display: block;
      touch-action: none;
      /* Scale to fit the screen while preserving the 400:550 play area */
      aspect-ratio: 400 / 550;
      width: min(100vw - 16px, (100dvh - 96px) * 400 / 550);
      height: auto;
      max-height: calc(100dvh - 96px);
    }
    #hint {
      margin-top: 10px;
      color: #8b6045;
      font-size: clamp(0.75rem, 3.5vw, 0.85rem);
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>🌸 Take Grandma to Wendy's 🌸</h1>
  <canvas id="gameCanvas" width="400" height="550"></canvas>
  <p id="hint"><strong>Tap</strong> the screen (or press <strong>Space</strong>) to flap!</p>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Load grandma cartoon sprites (purpose-built, safe to publish)
    const sprites = {};
    const SPRITE_FILES = {
      fly:       'sprites/grandma_fly.png',
      bruise:    'sprites/grandma_bruise.png',
      dazed:     'sprites/grandma_dazed.png',
      surprised: 'sprites/grandma_surprised.png',
    };
    for (const [key, src] of Object.entries(SPRITE_FILES)) {
      const img = new Image();
      img.onload = () => { sprites[key] = img; };
      img.src = src;
    }

    // "Uh oh!" death animation: slowly tab through these frames
    const DEATH_SEQUENCE = ['bruise', 'dazed', 'surprised'];
    const DEATH_FRAME_MS = 600;
    let deathTime = 0;

    const W = canvas.width;
    const H = canvas.height;
    const GROUND_H  = 60;
    const GRAVITY   = 0.34;
    const FLAP_STR  = -6.9;
    const PIPE_W        = 60;
    const PIPE_GAP_BASE = 184;
    const PIPE_SPD_BASE = 2.1;
    const PIPE_INT_BASE = 1750;
    const SCORE_TO_WIN  = 20;

    let bird, pipes, clouds, junk, score, highScore, highLevel, state, lastPipeTime;
    let level, totalScore, pipeGap, pipeSpd, pipeInt;

    function applyLevelDifficulty() {
      pipeSpd = Math.min(PIPE_SPD_BASE + (level - 1) * 0.28, 5.0);
      pipeGap = Math.max(PIPE_GAP_BASE - (level - 1) * 10, 118);
      pipeInt = Math.max(PIPE_INT_BASE - (level - 1) * 80, 950);
    }

    function resetGame() {
      level = 1;
      score = 0;
      totalScore = 0;
      bird = { x: 90, y: H / 2 - 20, vy: 0, w: 34, h: 40, rotation: 0 };
      pipes = [];
      lastPipeTime = 0;
      applyLevelDifficulty();
      state = 'idle';
    }

    function nextLevel() {
      level++;
      score = 0;
      pipes = [];
      lastPipeTime = 0;
      bird = { x: 90, y: H / 2 - 20, vy: 0, w: 34, h: 40, rotation: 0 };
      applyLevelDifficulty();
      state = 'playing';
    }

    function initClouds() {
      clouds = [];
      for (let i = 0; i < 5; i++) {
        clouds.push({
          x: Math.random() * W,
          y: 40 + Math.random() * 140,
          r: 22 + Math.random() * 28,
          speed: 0.25 + Math.random() * 0.3,
        });
      }
    }

    // Grandma's flying treasures: paper bags, boxes, newspapers, coupons
    const JUNK_TYPES = ['bag', 'box', 'news', 'coupon', 'pbag', 'pbag', 'paper'];
    const COUPON_TINTS = ['#ffe06b', '#ffb3c1', '#bde8c4', '#bcd6ff'];
    const PBAG_TINTS = ['#ffffff', '#eef3f7', '#e8f0ea', '#fdeef2'];

    function makeJunk(x) {
      return {
        type: JUNK_TYPES[Math.floor(Math.random() * JUNK_TYPES.length)],
        x,
        y: 40 + Math.random() * (H - GROUND_H - 80),
        rot: Math.random() * Math.PI * 2,
        rotSpd: (Math.random() - 0.5) * 0.06,
        scale: 0.6 + Math.random() * 0.75,
        speed: 0.8 + Math.random() * 1.1,
        phase: Math.random() * Math.PI * 2,
        wobAmp: 5 + Math.random() * 12,
        tint: COUPON_TINTS[Math.floor(Math.random() * COUPON_TINTS.length)],
        pbagTint: PBAG_TINTS[Math.floor(Math.random() * PBAG_TINTS.length)],
      };
    }

    function initJunk() {
      junk = [];
      for (let i = 0; i < 13; i++) junk.push(makeJunk(Math.random() * W));
    }

    // ── Drawing helpers ─────────────────────────────────────────────────────

    function drawSky() {
      const grad = ctx.createLinearGradient(0, 0, 0, H - GROUND_H);
      grad.addColorStop(0, '#fce4d6');
      grad.addColorStop(1, '#fef9f0');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H - GROUND_H);
    }

    function drawCloud(c) {
      ctx.globalAlpha = 0.82;
      ctx.fillStyle = '#fff';
      const d = (dx, dy, r) => {
        ctx.beginPath(); ctx.arc(c.x + dx, c.y + dy, r, 0, Math.PI * 2); ctx.fill();
      };
      d(0, 0, c.r); d(c.r * 0.7, c.r * 0.1, c.r * 0.75);
      d(-c.r * 0.65, c.r * 0.15, c.r * 0.65); d(c.r * 0.1, -c.r * 0.45, c.r * 0.55);
      ctx.globalAlpha = 1;
    }

    // ── Flying junk shapes (drawn centered at origin) ───────────────────────
    function shapeBag() {
      ctx.fillStyle = '#c79a5b'; ctx.strokeStyle = '#8a6634'; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.rect(-9, -11, 18, 22); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#b5894c';
      ctx.beginPath(); ctx.rect(-9, -11, 18, 5); ctx.fill(); ctx.stroke();
      ctx.strokeStyle = '#a87f44'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(-3, -6); ctx.lineTo(-3, 11);
      ctx.moveTo(3, -6); ctx.lineTo(3, 11); ctx.stroke();
    }
    function shapeBox() {
      ctx.fillStyle = '#d2a86a'; ctx.strokeStyle = '#9c7338'; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.rect(-11, -7, 22, 16); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#c2965a';
      ctx.beginPath(); ctx.moveTo(-11, -7); ctx.lineTo(-15, -13); ctx.lineTo(-2, -9); ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(11, -7); ctx.lineTo(15, -13); ctx.lineTo(2, -9); ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.strokeStyle = '#a87f44'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0, -7); ctx.lineTo(0, 9); ctx.stroke();
    }
    function shapeNews() {
      ctx.fillStyle = '#f5f1e6'; ctx.strokeStyle = '#b8b0a0'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.rect(-11, -13, 22, 26); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#3a3a3a'; ctx.fillRect(-9, -11, 18, 4);
      ctx.strokeStyle = '#9a948a'; ctx.lineWidth = 0.7;
      for (let i = 0; i < 7; i++) {
        const y = -4 + i * 2.4;
        ctx.beginPath(); ctx.moveTo(-9, y); ctx.lineTo(9, y); ctx.stroke();
      }
      ctx.strokeStyle = '#cfc8b8';
      ctx.beginPath(); ctx.moveTo(0, -7); ctx.lineTo(0, 13); ctx.stroke();
    }
    function shapeCoupon(tint) {
      ctx.fillStyle = tint; ctx.strokeStyle = '#d09020'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.rect(-13, -8, 26, 16); ctx.fill(); ctx.stroke();
      ctx.strokeStyle = '#c8141a'; ctx.lineWidth = 1; ctx.setLineDash([2, 2]);
      ctx.strokeRect(-10, -5, 20, 10); ctx.setLineDash([]);
      ctx.fillStyle = '#c8141a'; ctx.font = 'bold 9px Georgia';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('50%', 0, 1);
      ctx.textBaseline = 'alphabetic';
    }
    // Billowing, semi-transparent plastic grocery bag
    function shapePBag(tint) {
      ctx.fillStyle = tint; ctx.strokeStyle = 'rgba(150,160,170,0.7)'; ctx.lineWidth = 1;
      // puffed-out body
      ctx.beginPath();
      ctx.moveTo(-11, -2);
      ctx.quadraticCurveTo(-14, 10, -7, 13);
      ctx.quadraticCurveTo(0, 16, 7, 13);
      ctx.quadraticCurveTo(14, 10, 11, -2);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      // two handle loops
      ctx.beginPath();
      ctx.moveTo(-11, -2);
      ctx.quadraticCurveTo(-8, -11, -3, -3);
      ctx.moveTo(11, -2);
      ctx.quadraticCurveTo(8, -11, 3, -3);
      ctx.stroke();
      // crinkle highlights
      ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(-5, 2); ctx.lineTo(-3, 11);
      ctx.moveTo(3, 1); ctx.lineTo(5, 10); ctx.stroke();
    }
    // Crumpled ball of paper
    function shapePaper() {
      ctx.fillStyle = '#f3efe4'; ctx.strokeStyle = '#b8b0a0'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-9, -2); ctx.lineTo(-5, -8); ctx.lineTo(2, -6);
      ctx.lineTo(8, -9); ctx.lineTo(10, -1); ctx.lineTo(7, 7);
      ctx.lineTo(0, 9); ctx.lineTo(-7, 6); ctx.closePath();
      ctx.fill(); ctx.stroke();
      // crumple creases
      ctx.strokeStyle = '#cfc8b8'; ctx.lineWidth = 0.7;
      ctx.beginPath();
      ctx.moveTo(-4, -4); ctx.lineTo(2, 2);
      ctx.moveTo(5, -3); ctx.lineTo(0, 5);
      ctx.moveTo(-6, 2); ctx.lineTo(4, -1); ctx.stroke();
    }

    function drawJunkItem(j) {
      ctx.save();
      ctx.translate(j.x, j.y + Math.sin(j.phase) * j.wobAmp);
      ctx.rotate(j.rot);
      ctx.scale(j.scale, j.scale);
      ctx.globalAlpha = 0.92;
      if (j.type === 'bag') shapeBag();
      else if (j.type === 'box') shapeBox();
      else if (j.type === 'news') shapeNews();
      else if (j.type === 'paper') shapePaper();
      else if (j.type === 'pbag') { ctx.globalAlpha = 0.78; shapePBag(j.pbagTint); }
      else shapeCoupon(j.tint);
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    function drawGround() {
      ctx.fillStyle = '#d4a574';
      ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
      ctx.fillStyle = '#c49060';
      ctx.fillRect(0, H - GROUND_H, W, 6);
      ctx.fillStyle = '#9bc77a';
      for (let x = 0; x < W; x += 18) {
        ctx.beginPath();
        ctx.moveTo(x, H - GROUND_H);
        ctx.lineTo(x + 6, H - GROUND_H - 8);
        ctx.lineTo(x + 12, H - GROUND_H);
        ctx.fill();
      }
    }

    function drawFlower(cx, cy) {
      const petal = ['#f4a7c0', '#f9c8da', '#e8a0b4', '#f7b3c8'];
      for (let i = 0; i < 5; i++) {
        const a = (i / 5) * Math.PI * 2;
        ctx.fillStyle = petal[i % petal.length];
        ctx.beginPath();
        ctx.arc(cx + Math.cos(a) * 7, cy + Math.sin(a) * 7, 6, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = '#f7e26b';
      ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI * 2); ctx.fill();
    }

    function drawPipe(pipe) {
      const topH = pipe.topY;
      const botY = pipe.topY + pipeGap;
      const botH = H - GROUND_H - botY;

      const drawRect = (x, y, w, h, isTop) => {
        const grad = ctx.createLinearGradient(x, 0, x + w, 0);
        grad.addColorStop(0, '#5a8a50');
        grad.addColorStop(0.3, '#7daa6f');
        grad.addColorStop(1, '#4a7542');
        ctx.fillStyle = grad;
        ctx.fillRect(x, y, w, h);

        ctx.fillStyle = '#5a8a50';
        const rimW = w + 10, rimH = 14, rimX = x - 5;
        if (isTop) {
          ctx.fillRect(rimX, y + h - rimH, rimW, rimH);
          ctx.strokeStyle = '#3d6b35'; ctx.lineWidth = 1.5;
          ctx.strokeRect(rimX, y + h - rimH, rimW, rimH);
          drawFlower(x + w / 2, y + h - rimH - 8);
        } else {
          ctx.fillRect(rimX, y, rimW, rimH);
          ctx.strokeStyle = '#3d6b35'; ctx.lineWidth = 1.5;
          ctx.strokeRect(rimX, y, rimW, rimH);
          drawFlower(x + w / 2, y + rimH + 8);
        }
      };

      drawRect(pipe.x, 0, PIPE_W, topH, true);
      drawRect(pipe.x, botY, PIPE_W, botH, false);
    }

    function drawGrandmaPlane() {
      const s = 1;

      // --- Main wing (behind body) ---
      ctx.fillStyle = '#dfc98a';
      ctx.beginPath();
      ctx.moveTo(-14*s, -4*s);
      ctx.lineTo( 18*s, -4*s);
      ctx.lineTo( 34*s, -20*s);
      ctx.lineTo(-36*s, -20*s);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#8b7355'; ctx.lineWidth = 1.2;
      ctx.stroke();

      // Wing detail line
      ctx.strokeStyle = '#c4a87a'; ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(-30*s, -17*s); ctx.lineTo(28*s, -17*s); ctx.stroke();

      // --- Fuselage ---
      const fuseGrad = ctx.createLinearGradient(-34*s, 0, 34*s, 0);
      fuseGrad.addColorStop(0,   '#c8b07a');
      fuseGrad.addColorStop(0.3, '#e8d5a3');
      fuseGrad.addColorStop(0.7, '#e8d5a3');
      fuseGrad.addColorStop(1,   '#b8a06a');
      ctx.fillStyle = fuseGrad;
      ctx.beginPath();
      ctx.ellipse(0, 8*s, 35*s, 12*s, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#8b7355'; ctx.lineWidth = 1.5;
      ctx.stroke();

      // Red stripe on fuselage
      ctx.fillStyle = '#cc2222';
      ctx.beginPath();
      ctx.ellipse(0, 8*s, 35*s, 4*s, 0, 0, Math.PI * 2);
      ctx.fill();

      // --- Tail fin (vertical, left side) ---
      ctx.fillStyle = '#dfc98a';
      ctx.beginPath();
      ctx.moveTo(-22*s,  2*s);
      ctx.lineTo(-36*s, -16*s);
      ctx.lineTo(-36*s,  5*s);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#8b7355'; ctx.lineWidth = 1.2; ctx.stroke();

      // Horizontal stabilizer (small tail wing)
      ctx.fillStyle = '#dfc98a';
      ctx.beginPath();
      ctx.moveTo(-24*s, 8*s);
      ctx.lineTo(-36*s, 8*s);
      ctx.lineTo(-36*s, 3*s);
      ctx.lineTo(-22*s, 4*s);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#8b7355'; ctx.lineWidth = 1; ctx.stroke();

      // --- Engine cowling (front) ---
      ctx.fillStyle = '#555';
      ctx.beginPath();
      ctx.arc(32*s, 8*s, 10*s, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#777';
      ctx.beginPath();
      ctx.arc(32*s, 8*s, 7*s, 0, Math.PI * 2);
      ctx.fill();

      // Propeller hub
      ctx.fillStyle = '#ccc';
      ctx.beginPath();
      ctx.arc(40*s, 8*s, 4*s, 0, Math.PI * 2);
      ctx.fill();

      // Propeller blades (spinning — two blades)
      ctx.fillStyle = '#6a5a3a';
      ctx.beginPath();
      ctx.ellipse(40*s, 8*s, 3*s, 16*s, 0.15, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(40*s, 8*s, 16*s, 3*s, 0.15, 0, Math.PI * 2);
      ctx.fill();
      // Blur ring for spinning effect
      ctx.strokeStyle = 'rgba(180,160,100,0.25)';
      ctx.lineWidth = 4*s;
      ctx.beginPath();
      ctx.arc(40*s, 8*s, 14*s, 0, Math.PI * 2);
      ctx.stroke();

      // --- Landing gear ---
      ctx.strokeStyle = '#555'; ctx.lineWidth = 2.2*s; ctx.lineCap = 'round';
      // Left strut
      ctx.beginPath();
      ctx.moveTo(-5*s, 17*s); ctx.lineTo(-8*s, 28*s); ctx.stroke();
      // Right strut
      ctx.beginPath();
      ctx.moveTo( 8*s, 17*s); ctx.lineTo(10*s, 28*s); ctx.stroke();
      // Cross brace
      ctx.lineWidth = 1.5*s;
      ctx.beginPath();
      ctx.moveTo(-8*s, 28*s); ctx.lineTo(10*s, 28*s); ctx.stroke();

      // Wheels
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(1*s, 30*s, 5*s, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#555';
      ctx.beginPath(); ctx.arc(1*s, 30*s, 2.5*s, 0, Math.PI * 2); ctx.fill();

      // Wheel spokes
      ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
      for (let i = 0; i < 4; i++) {
        const a = (i / 4) * Math.PI;
        ctx.beginPath();
        ctx.moveTo(1*s + Math.cos(a) * 4.5*s, 30*s + Math.sin(a) * 4.5*s);
        ctx.lineTo(1*s - Math.cos(a) * 4.5*s, 30*s - Math.sin(a) * 4.5*s);
        ctx.stroke();
      }

      // --- Grandma ---

      // Torso / gray vest
      ctx.fillStyle = '#808080';
      ctx.beginPath();
      ctx.ellipse(3*s, -10*s, 12*s, 15*s, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#606060'; ctx.lineWidth = 1; ctx.stroke();

      // Shirt collar (light blue-gray peeking out)
      ctx.fillStyle = '#c0cdd8';
      ctx.beginPath();
      ctx.ellipse(3*s, -11*s, 5*s, 7*s, 0, 0, Math.PI * 2);
      ctx.fill();

      // Neck
      ctx.fillStyle = '#f0c090';
      ctx.beginPath();
      ctx.ellipse(3*s, -23*s, 4*s, 5*s, 0, 0, Math.PI * 2);
      ctx.fill();

      // Head
      ctx.fillStyle = '#f0c090';
      ctx.beginPath();
      ctx.arc(3*s, -33*s, 11*s, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#c49060'; ctx.lineWidth = 1; ctx.stroke();

      // Hair — short, soft gray
      ctx.fillStyle = '#d8d4d0';
      ctx.beginPath();
      ctx.arc(3*s, -39*s, 9.5*s, Math.PI, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(-6*s, -33*s, 5*s, Math.PI * 0.5, Math.PI * 1.5);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(12*s, -33*s, 5*s, -Math.PI * 0.5, Math.PI * 0.5);
      ctx.fill();
      // Hair texture lines
      ctx.strokeStyle = '#bbb8b5'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(-3*s, -42*s); ctx.lineTo(-1*s, -38*s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo( 3*s, -43*s); ctx.lineTo( 3*s, -38*s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo( 9*s, -42*s); ctx.lineTo( 7*s, -38*s); ctx.stroke();

      // Eyes (soft almond shape)
      ctx.fillStyle = '#2a2a2a';
      ctx.beginPath(); ctx.ellipse(-2*s, -34*s, 2.8*s, 1.8*s, -0.15, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse( 8*s, -34*s, 2.8*s, 1.8*s,  0.15, 0, Math.PI * 2); ctx.fill();
      // Eye shine
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-1*s, -34.5*s, 0.9*s, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc( 9*s, -34.5*s, 0.9*s, 0, Math.PI * 2); ctx.fill();

      // Eyebrows
      ctx.strokeStyle = '#7a6a5a'; ctx.lineWidth = 1.4;
      ctx.beginPath(); ctx.moveTo(-5*s, -37.5*s); ctx.lineTo( 1*s, -36.5*s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo( 6*s, -36.5*s); ctx.lineTo(12*s, -37.5*s); ctx.stroke();

      // Nose
      ctx.strokeStyle = '#c49060'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(3*s, -31*s, 2.5*s, 0.2, Math.PI - 0.2); ctx.stroke();

      // Smile
      ctx.strokeStyle = '#c49060'; ctx.lineWidth = 1.8; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(3*s, -30*s, 4.5*s, 0.15, Math.PI - 0.15); ctx.stroke();

      // Rosy cheeks
      ctx.fillStyle = 'rgba(230,120,120,0.32)';
      ctx.beginPath(); ctx.ellipse(-3*s, -30*s, 4.5*s, 2.5*s, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse( 9*s, -30*s, 4.5*s, 2.5*s, 0, 0, Math.PI * 2); ctx.fill();

      // Left arm reaching to yoke
      ctx.strokeStyle = '#f0c090'; ctx.lineWidth = 4.5*s; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-4*s, -16*s);
      ctx.quadraticCurveTo(5*s, -12*s, 14*s, -8*s);
      ctx.stroke();

      // Right arm reaching to yoke
      ctx.beginPath();
      ctx.moveTo(10*s, -16*s);
      ctx.quadraticCurveTo(15*s, -12*s, 20*s, -8*s);
      ctx.stroke();

      // Hands
      ctx.fillStyle = '#f0c090';
      ctx.beginPath(); ctx.arc(14*s, -8*s, 3.5*s, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(20*s, -8*s, 3.5*s, 0, Math.PI * 2); ctx.fill();

      // Steering yoke — U shape
      ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 3.5*s; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(14*s, -8*s);
      ctx.lineTo(14*s, -16*s);
      ctx.arc(20*s, -16*s, 6*s, Math.PI, 0);
      ctx.lineTo(26*s, -8*s);
      ctx.stroke();

      // Yoke post down to instrument panel
      ctx.lineWidth = 3*s;
      ctx.beginPath();
      ctx.moveTo(20*s, -10*s); ctx.lineTo(20*s, 0*s); ctx.stroke();

      // Motion lines (trailing behind)
      ctx.strokeStyle = 'rgba(160,140,120,0.45)';
      ctx.lineWidth = 1.8; ctx.lineCap = 'butt';
      ctx.beginPath();
      ctx.moveTo(-42*s,  1*s); ctx.lineTo(-58*s,  0*s); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-41*s,  8*s); ctx.lineTo(-56*s,  9*s); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-40*s, 15*s); ctx.lineTo(-52*s, 16*s); ctx.stroke();
    }

    // Draw an image centered at (cx,cy), scaled to displayH preserving aspect.
    function drawSpriteFitted(img, cx, cy, displayH, rot) {
      const aspect = img.naturalWidth / img.naturalHeight;
      const h = displayH, w = displayH * aspect;
      ctx.save();
      ctx.translate(cx, cy);
      if (rot) ctx.rotate(rot);
      ctx.drawImage(img, -w / 2, -h / 2, w, h);
      ctx.restore();
    }

    const BIRD_DISPLAY_H = 72;

    function drawBird() {
      const b = bird;
      if (state === 'dead') return;
      if (!sprites.fly) return;
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(b.rotation);
      drawSpriteFitted(sprites.fly, 0, 0, BIRD_DISPLAY_H, 0);
      ctx.restore();
    }

    // ── UI panels ───────────────────────────────────────────────────────────

    function drawScore() {
      ctx.fillStyle = 'rgba(255,255,255,0.72)';
      ctx.beginPath(); ctx.roundRect(W / 2 - 58, 12, 116, 38, 10); ctx.fill();
      ctx.fillStyle = '#7a4f2e';
      ctx.font = 'bold 23px Georgia';
      ctx.textAlign = 'center';
      ctx.fillText(`${score} / ${SCORE_TO_WIN}`, W / 2, 39);

      ctx.fillStyle = 'rgba(255,255,255,0.72)';
      ctx.beginPath(); ctx.roundRect(W - 72, 14, 60, 28, 8); ctx.fill();
      ctx.fillStyle = '#a0522d';
      ctx.font = 'bold 13px Georgia';
      ctx.fillText(`LVL ${level}`, W - 42, 33);
    }

    function drawIdleScreen() {
      ctx.fillStyle = 'rgba(255,245,235,0.90)';
      ctx.beginPath(); ctx.roundRect(W / 2 - 140, H / 2 - 80, 280, 160, 16); ctx.fill();
      ctx.strokeStyle = '#c4a882'; ctx.lineWidth = 2; ctx.stroke();

      ctx.fillStyle = '#a0522d';
      ctx.font = 'bold 22px Georgia'; ctx.textAlign = 'center';
      ctx.fillText('🌸 Take Grandma to Wendy's', W / 2, H / 2 - 40);

      ctx.fillStyle = '#7a4f2e'; ctx.font = '16px Georgia';
      ctx.fillText('Press Space or tap to start', W / 2, H / 2);
      ctx.fillText('Keep Grandma in the air!', W / 2, H / 2 + 28);

      if (highScore) {
        ctx.fillStyle = '#c47a3d'; ctx.font = '14px Georgia';
        ctx.fillText(`Best run: Level ${highLevel} · ${highScore} pipes`, W / 2, H / 2 + 56);
      }
    }

    const QUOTES = [
      '"Off to Wendy\'s I go!"',
      '"No, you can\'t throw that away."',
      '"Be careful!"',
      '"Did you eat yet?"',
      '"I\'m not driving too fast, you are."',
      '"Hold on, let me find my glasses."',
      '"One more try, dearie."',
    ];

    function drawDeadScreen() {
      const panelTop = H / 2 - 170, panelH = 320;
      ctx.fillStyle = 'rgba(255,245,235,0.94)';
      ctx.beginPath(); ctx.roundRect(W / 2 - 140, panelTop, 280, panelH, 16); ctx.fill();
      ctx.strokeStyle = '#c4a882'; ctx.lineWidth = 2; ctx.stroke();

      // Slowly tab through the "uh oh" death frames as the centerpiece
      const seqReady = DEATH_SEQUENCE.every(k => sprites[k]);
      if (seqReady) {
        const idx = Math.floor((performance.now() - deathTime) / DEATH_FRAME_MS) % DEATH_SEQUENCE.length;
        drawSpriteFitted(sprites[DEATH_SEQUENCE[idx]], W / 2, panelTop + 78, 120, 0);
      }

      ctx.fillStyle = '#a0522d'; ctx.font = 'bold 24px Georgia'; ctx.textAlign = 'center';
      ctx.fillText('Oh dear! 😅', W / 2, panelTop + 168);

      ctx.fillStyle = '#7a4f2e'; ctx.font = '18px Georgia';
      ctx.fillText(`Level ${level} · ${totalScore} pipes total`, W / 2, panelTop + 200);

      if (highScore) {
        ctx.fillStyle = totalScore >= highScore ? '#d4870a' : '#8b6045';
        ctx.font = '15px Georgia';
        ctx.fillText(
          totalScore >= highScore ? `New Best: ${highScore} pipes! 🎉` : `Best: Level ${highLevel} · ${highScore} pipes`,
          W / 2, panelTop + 226
        );
      }

      ctx.fillStyle = '#a0522d'; ctx.font = '15px Georgia';
      ctx.fillText('Press Space or tap to try again', W / 2, panelTop + 264);

      ctx.fillStyle = '#b07040'; ctx.font = 'italic 13px Georgia';
      ctx.fillText(currentQuote, W / 2, panelTop + 292);
    }

    function drawWendysScreen() {
      const panelTop = H / 2 - 202, panelH = 398;
      ctx.fillStyle = 'rgba(255,245,235,0.96)';
      ctx.beginPath(); ctx.roundRect(W / 2 - 145, panelTop, 290, panelH, 16); ctx.fill();
      ctx.strokeStyle = '#cc2020'; ctx.lineWidth = 2.5; ctx.stroke();

      // ── Wendy's building ──────────────────────────────────────────────
      const bx = W / 2 - 92, by = panelTop + 10, bw = 184, bh = 108;

      // Sky
      ctx.fillStyle = '#cce8fa';
      ctx.fillRect(bx, by, bw, bh);

      // Facade
      ctx.fillStyle = '#f2e2c8';
      ctx.fillRect(bx, by + 24, bw, bh - 24);

      // Red awning
      ctx.fillStyle = '#cc1010';
      ctx.fillRect(bx - 8, by + 20, bw + 16, 18);

      // Sign board
      ctx.fillStyle = '#cc1010';
      ctx.fillRect(W / 2 - 62, by, 124, 24);
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
      ctx.strokeRect(W / 2 - 58, by + 3, 116, 17);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 13px Georgia'; ctx.textAlign = 'center';
      ctx.fillText("Wendy's", W / 2, by + 16);

      // Left window
      ctx.fillStyle = '#a8e0f8'; ctx.strokeStyle = '#7a5030'; ctx.lineWidth = 1.5;
      ctx.fillRect(bx + 8, by + 34, 48, 40); ctx.strokeRect(bx + 8, by + 34, 48, 40);
      ctx.beginPath();
      ctx.moveTo(bx + 32, by + 34); ctx.lineTo(bx + 32, by + 74);
      ctx.moveTo(bx + 8,  by + 54); ctx.lineTo(bx + 56, by + 54); ctx.stroke();

      // Right window
      ctx.fillStyle = '#a8e0f8';
      ctx.fillRect(bx + bw - 56, by + 34, 48, 40); ctx.strokeRect(bx + bw - 56, by + 34, 48, 40);
      ctx.beginPath();
      ctx.moveTo(bx + bw - 32, by + 34); ctx.lineTo(bx + bw - 32, by + 74);
      ctx.moveTo(bx + bw - 56, by + 54); ctx.lineTo(bx + bw - 8, by + 54); ctx.stroke();

      // Door
      ctx.fillStyle = '#dd2020';
      ctx.fillRect(W / 2 - 16, by + 42, 32, 50);
      ctx.beginPath(); ctx.arc(W / 2, by + 42, 16, Math.PI, 0); ctx.fill();
      ctx.fillStyle = '#ffd050';
      ctx.beginPath(); ctx.arc(W / 2 + 10, by + 64, 2.5, 0, Math.PI * 2); ctx.fill();

      // Grass & sidewalk
      ctx.fillStyle = '#7bc35a'; ctx.fillRect(bx - 8, by + bh - 14, bw + 16, 10);
      ctx.fillStyle = '#c4bbb0'; ctx.fillRect(bx - 8, by + bh - 4,  bw + 16, 8);

      // ── Text ──────────────────────────────────────────────────────────
      ctx.fillStyle = '#cc1010';
      ctx.font = 'bold 20px Georgia'; ctx.textAlign = 'center';
      ctx.fillText("You made it to Wendy's! 🍔", W / 2, panelTop + 148);

      ctx.fillStyle = '#7a4f2e'; ctx.font = 'bold 17px Georgia';
      ctx.fillText(`Level ${level} Complete!`, W / 2, panelTop + 178);

      ctx.fillStyle = '#8b6045'; ctx.font = '15px Georgia';
      ctx.fillText(`Total pipes cleared: ${totalScore}`, W / 2, panelTop + 208);

      ctx.fillStyle = '#a06030'; ctx.font = '15px Georgia';
      ctx.fillText(`Up next: Level ${level + 1} 🌸`, W / 2, panelTop + 240);

      if (level + 1 > 3) {
        ctx.fillStyle = '#8b6045'; ctx.font = 'italic 13px Georgia';
        ctx.fillText(`Speed: ${pipeSpd.toFixed(1)}x · Gap: ${pipeGap}px`, W / 2, panelTop + 262);
      }

      ctx.fillStyle = '#a0522d'; ctx.font = '14px Georgia';
      ctx.fillText('Press Space or tap to continue', W / 2, panelTop + 290);

      ctx.fillStyle = '#b07040'; ctx.font = 'italic 13px Georgia';
      ctx.fillText('"Off to Wendy\'s I go!"', W / 2, panelTop + 316);
    }

    // ── Game logic ──────────────────────────────────────────────────────────

    function spawnPipe(now) {
      const minTop = 60;
      const maxTop = H - GROUND_H - pipeGap - 60;
      pipes.push({ x: W + 10, topY: minTop + Math.random() * (maxTop - minTop), scored: false });
      lastPipeTime = now;
    }

    function updateClouds() {
      for (const c of clouds) {
        c.x -= c.speed;
        if (c.x + c.r * 2 < 0) { c.x = W + c.r; c.y = 40 + Math.random() * 140; }
      }
    }

    function updateJunk() {
      for (let i = 0; i < junk.length; i++) {
        const j = junk[i];
        j.x -= j.speed;
        j.rot += j.rotSpd;
        j.phase += 0.03;
        if (j.x < -34) junk[i] = makeJunk(W + 20 + Math.random() * 60);
      }
    }

    function birdHitsPipe(b, p) {
      const m = 11;
      const bL = b.x - b.w / 2 + m, bR = b.x + b.w / 2 - m;
      const bT = b.y - b.h / 2 + m, bB = b.y + b.h / 2 - m;
      if (!(bR > p.x - 5 && bL < p.x + PIPE_W + 5)) return false;
      return bT < p.topY || bB > p.topY + pipeGap;
    }

    let currentQuote = QUOTES[0];

    function die() {
      state = 'dead';
      deathTime = performance.now();
      totalScore += score;
      if (!highScore || totalScore > highScore) { highScore = totalScore; highLevel = level; }
      currentQuote = QUOTES[Math.floor(Math.random() * QUOTES.length)];
    }

    function flap() {
      if (state === 'idle')   { state = 'playing'; bird.vy = FLAP_STR; return; }
      if (state === 'dead')   { resetGame(); state = 'playing'; bird.vy = FLAP_STR; return; }
      if (state === 'wendy')  { nextLevel(); return; }
      if (state === 'playing') bird.vy = FLAP_STR;
    }

    function loop(now) {
      updateClouds();
      updateJunk();

      if (state === 'playing') {
        bird.vy += GRAVITY;
        bird.y  += bird.vy;
        bird.rotation = Math.min(Math.max(bird.vy * 0.06, -0.45), 1.1);

        if (now - lastPipeTime > pipeInt) spawnPipe(now);

        for (const p of pipes) {
          p.x -= pipeSpd;
          if (!p.scored && p.x + PIPE_W < bird.x) {
            p.scored = true;
            score++;
            if (score >= SCORE_TO_WIN) { state = 'wendy'; }
          }
        }
        pipes = pipes.filter(p => p.x + PIPE_W + 20 > 0);

        if (bird.y + bird.h / 2 >= H - GROUND_H || bird.y - bird.h / 2 <= 0) die();
        for (const p of pipes) { if (birdHitsPipe(bird, p)) { die(); break; } }
      }

      drawSky();
      for (const c of clouds) drawCloud(c);
      for (const j of junk) drawJunkItem(j);
      for (const p of pipes) drawPipe(p);
      drawGround();
      drawBird();

      if (state !== 'idle') drawScore();
      if (state === 'idle')  drawIdleScreen();
      if (state === 'dead')  drawDeadScreen();
      if (state === 'wendy') drawWendysScreen();

      requestAnimationFrame(loop);
    }

    // ── Input ────────────────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.key === 'ArrowUp') { e.preventDefault(); flap(); }
    });
    // Tap/click anywhere on the page to flap (mobile-friendly)
    window.addEventListener('pointerdown', e => { e.preventDefault(); flap(); }, { passive: false });
    // Block double-tap-to-zoom and long-press menus on touch devices
    document.addEventListener('touchstart', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturestart', e => e.preventDefault());
    document.addEventListener('contextmenu', e => e.preventDefault());

    // ── Init ─────────────────────────────────────────────────────────────────
    highScore = 0;
    highLevel = 0;
    resetGame();
    initClouds();
    initJunk();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
